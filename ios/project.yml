name: Cloak
options:
  bundleIdPrefix: app.cloak
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"
packages: {}
targets:
  Cloak:
    type: application
    platform: iOS
    sources:
      - path: CloakApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.cloak.mobile
        INFOPLIST_FILE: CloakApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: CloakApp/Cloak.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: CloakShareExtension
        embed: true
  CloakShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: CloakShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.cloak.mobile.share
        INFOPLIST_FILE: CloakShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: CloakShareExtension/CloakShareExtension.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies: []
